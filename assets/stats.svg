<svg xmlns="http://www.w3.org/2000/svg" width="440" height="175" viewBox="0 0 440 175" role="img" aria-label="GitHub Snapshot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D0D0D"/>
      <stop offset="1" stop-color="#120a26"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="438" height="173" rx="14" fill="url(#bg)" stroke="#B39DFF" stroke-width="1.5"/>
  <text x="24" y="32" font-family="Segoe UI,Verdana,sans-serif" font-size="16" font-weight="700" fill="#B39DFF">GitHub Snapshot</text>
  <line x1="24" y1="44" x2="416" y2="44" stroke="#2d2168" stroke-width="1"/>

  <text x="34"  y="92"  font-family="Segoe UI,sans-serif" font-size="30" font-weight="800" fill="#B39DFF">41</text>
