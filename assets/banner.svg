<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="320" viewBox="0 0 1400 320" role="img" aria-label="Janga Sashi Hari Krishna — Data Analyst">
  <defs>
    <radialGradient id="bg" cx="50%" cy="44%" r="82%">
      <stop offset="0%"  stop-color="#1d1444"/>
      <stop offset="55%" stop-color="#0e0a28"/>
      <stop offset="100%" stop-color="#050314"/>
    </radialGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#f3eeff"/>
      <stop offset="45%" stop-color="#bfa6ff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="scanFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#d9ccff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1"   stop-color="#d9ccff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0 L0 0 L0 44" fill="none" stroke="#2d2168" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="nameClip">
      <text x="700" y="180" text-anchor="middle" textLength="1000" lengthAdjust="spacingAndGlyphs"
            font-family="'Segoe UI','Arial Black',Arial,sans-serif" font-size="58" font-weight="800"
            letter-spacing="3">JANGA SASHI HARI KRISHNA</text>
    </clipPath>
  </defs>

  <!-- ground + grid + horizon glow -->
  <rect width="1400" height="320" fill="url(#bg)"/>
  <rect width="1400" height="320" fill="url(#grid)" opacity="0.20"/>
  <ellipse cx="700" cy="172" rx="520" ry="92" fill="#7c4dff" opacity="0.10"/>

  <!-- horizontal scan line sweeping across -->
  <rect x="60" y="28" width="2" height="264" fill="#cdb8ff" opacity="0.38">
    <animate attributeName="x" values="70;1330;70" dur="6.5s" keyTimes="0;0.5;1" repeatCount="indefinite"/>
  </rect>

  <!-- HUD frame + corner brackets -->
  <rect x="22" y="22" width="1356" height="276" fill="none" stroke="#3a2c78" stroke-width="1" opacity="0.6"/>
  <g stroke="#b39dff" stroke-width="1.8" fill="none" opacity="0.92" filter="url(#glow)">
    <path d="M40,88 L40,40 L88,40"/>
    <path d="M1360,88 L1360,40 L1312,40"/>
    <path d="M40,232 L40,280 L88,280"/>
    <path d="M1360,232 L1360,280 L1312,280"/>
  </g>
  <g fill="#b39dff" filter="url(#glow)">
    <rect x="36" y="36" width="8" height="8"/>
    <rect x="1356" y="36" width="8" height="8"/>
    <rect x="36" y="276" width="8" height="8"/>
    <rect x="1356" y="276" width="8" height="8"/>
    <rect x="120" y="39" width="22" height="2" opacity="0.6"/>
    <rect x="1258" y="39" width="22" height="2" opacity="0.6"/>
  </g>

  <!-- blinking status nodes -->
  <g fill="#cbb8ff">
    <circle cx="170" cy="160" r="3.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="1230" cy="160" r="3.2"><animate attributeName="opacity" values="1;0.2;1" dur="2.9s" repeatCount="indefinite"/></circle>
  </g>

  <!-- eyebrow -->
  <text x="700" y="98" text-anchor="middle" fill="#c4b5fd" filter="url(#glow)"
        font-family="Consolas,'Courier New',monospace" font-size="20" font-weight="700"
        letter-spacing="9">// DATA ANALYST</text>

  <!-- name: neon glow + animated scan-sheen -->
  <text x="700" y="180" text-anchor="middle" fill="#a78bfa" opacity="0.5" filter="url(#glow)"
        textLength="1000" lengthAdjust="spacingAndGlyphs"
        font-family="'Segoe UI','Arial Black',Arial,sans-serif" font-size="58" font-weight="800"
        letter-spacing="3">JANGA SASHI HARI KRISHNA
        <animate attributeName="opacity" values="0.5;0.36;0.55;0.45" dur="3.4s" repeatCount="indefinite"/>
  </text>
  <g clip-path="url(#nameClip)">
    <rect x="190" y="128" width="1020" height="74" fill="url(#neon)"/>
    <rect x="0" y="128" width="150" height="74" fill="url(#scanFill)" transform="skewX(-16)">
      <animate attributeName="x" values="160;1180;160" keyTimes="0;0.55;1" dur="5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- data-flow divider -->
  <g>
    <line x1="596" y1="208" x2="804" y2="208" stroke="#4a3a8a" stroke-width="1.2" opacity="0.6"/>
    <line x1="596" y1="208" x2="804" y2="208" stroke="#b39dff" stroke-width="1.8" stroke-dasharray="5 13" stroke-linecap="round" filter="url(#glow)">
      <animate attributeName="stroke-dashoffset" values="0;-36" dur="1.1s" repeatCount="indefinite"/>
    </line>
    <circle cx="700" cy="208" r="3.6" fill="#e4dbff" filter="url(#glow)"/>
  </g>

  <!-- skills -->
  <text x="700" y="248" text-anchor="middle" fill="#b9a6ff"
        font-family="Consolas,'Courier New',monospace" font-size="17" font-weight="600"
        letter-spacing="5">SQL&#160;&#160;&#183;&#160;&#160;PYTHON&#160;&#160;&#183;&#160;&#160;POWER BI&#160;&#160;&#183;&#160;&#160;ML</text>

  <!-- footer -->
  <text x="700" y="286" text-anchor="middle" fill="#8b78c8" opacity="0.9"
        font-family="Consolas,'Courier New',monospace" font-size="13" font-weight="500"
        letter-spacing="6">// BENGALURU, INDIA</text>
</svg>
